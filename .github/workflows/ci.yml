name: BekoSIRS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # Backend Tests (Django + pytest)
  # ─────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./BekoSIRS_api

    # Ephemeral PostgreSQL — her CI run'ında sıfırdan başlar, production'a dokunmaz
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: bekosirs_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'BekoSIRS_api/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run tests
        env:
          SECRET_KEY: 'test-secret-key-for-ci-only'
          DEBUG: 'True'
          ALLOWED_HOSTS: 'localhost,127.0.0.1'
          # CI: lokal PostgreSQL container (production'da Supabase kullanılır)
          DB_ENGINE: 'postgresql'
          DB_NAME: 'bekosirs_test'
          DB_USER: 'testuser'
          DB_PASSWORD: 'testpassword'
          DB_HOST: 'localhost'
          DB_PORT: '5432'
        run: |
          pytest --no-header -v --override-ini="addopts=--nomigrations" -p no:cacheprovider \
            --cov=products --cov=bekosirs_backend \
            --cov-report=term-missing \
            --cov-fail-under=25 \
            --ignore=test_notifications.py \
            --ignore=test_installments.py \
            --ignore=products/test_biometric.py

  # ─────────────────────────────────────────
  # Web Panel (React + TypeScript)
  # ─────────────────────────────────────────
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./BekoSIRS_Web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'BekoSIRS_Web/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit || true

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────
  # Mobile App (Expo / React Native)
  # ─────────────────────────────────────────
  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./BekoSIRS_Frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'BekoSIRS_Frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Expo Doctor (check config)
        run: npx expo-doctor || true

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

  # ─────────────────────────────────────────
  # CD — Web Build Artifact (main branch only)
  # ─────────────────────────────────────────
  deploy:
    needs: [backend, web, mobile]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./BekoSIRS_Web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'BekoSIRS_Web/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: BekoSIRS_Web/dist/
          retention-days: 30
